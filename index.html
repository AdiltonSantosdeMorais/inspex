<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AlertaFlota - Elecnor Chile</title>
    
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" sizes="512x512" href="/static/icon.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icon.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --blue: #003366; --gray: #cbd5e0; --light-gray: #f0f2f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: var(--light-gray); margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
        
        .row { 
            display: flex; 
            border-bottom: 1px solid #000; 
            width: 100%; 
        }

        .cell { 
            border-right: 1px solid #000; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            width: 50%; 
            position: relative; 
            z-index: 1; 
        }
        .cell:last-child { border-right: none; }

        input[type="time"], input[type="date"] {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background: #ffffff;
            border: 1px solid #cbd5e1 !important; 
            padding: 10px 8px !important;
            border-radius: 6px;
            width: 100%;
            max-width: 100%;
            display: block;
            font-size: 14px;
            font-family: inherit;
            color: #000000;
            box-sizing: border-box;
            min-height: 42px;
            line-height: normal;
        }

        .app-container { background: white; width: 100%; max-width: 800px; margin: 0 auto; min-height: 100vh; border: 1px solid #000; display: flex; flex-direction: column; }
        .header-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .header-table td { border: 1px solid #000; text-align: center; padding: 5px; font-weight: bold; font-size: 10px; overflow: hidden; }
        .logo-img { width: 60px; height: auto; display: block; margin: 0 auto; }
        .tech-info { text-align: left !important; font-size: 7px !important; line-height: 1.2; }

        .section-header { background: var(--gray); border: 1px solid #000; padding: 10px; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        
        label { font-size: 10px; font-weight: bold; margin-bottom: 6px; color: var(--blue); text-transform: uppercase; }
        input, textarea, select { border: none; outline: none; font-size: 14px; background: transparent; width: 100%; color: #000; }
        
        select {
            appearance: none;
            -webkit-appearance: none;
            background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23003366' d='M0 0l5 5 5-5z'/></svg>") no-repeat right 10px center;
            background-size: 10px 6px;
            padding-right: 25px;
        }
        
        .area-grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            width: 100%; 
            padding: 5px 0; 
        }
        .check-item { 
            display: flex; 
            align-items: center; 
            font-size: 11px; 
            font-weight: bold; 
            text-transform: uppercase;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            min-width: calc(50% - 5px);
        }
        .check-item input[type="radio"] {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .photo-upload { padding: 25px; border: 2px dashed var(--gray); margin: 15px; text-align: center; cursor: pointer; background: #fafafa; border-radius: 4px; }
        
        .preview-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            padding: 15px; 
            width: 100%;
        }
        .preview-thumb { 
            width: 100%; 
            height: 130px; 
            object-fit: contain;
            background: #e2e8f0;
            border: 1px solid #000; 
            border-radius: 4px;
        }

        .btn-submit { background: var(--blue); color: white; border: none; padding: 20px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; transition: background 0.2s; }
        .btn-submit:disabled { background: #64748b !important; cursor: not-allowed; }
        #statusMsg { font-size: 12px; text-align: center; padding: 15px; display: none; font-weight: bold; }

        @media (max-width: 480px) { 
            .row.context-row { flex-wrap: nowrap !important; }
            .row:not(.context-row) { flex-wrap: wrap; }
            .row:not(.context-row) .cell { min-width: 100%; border-right: none; border-bottom: 1px solid #000; }
            .row:not(.context-row) .cell:last-child { border-bottom: none; }
            .preview-container { gap: 6px; padding: 10px; }
            .preview-thumb { height: 100px; }
            .check-item { min-width: calc(50% - 5px); }
        }
    </style>
</head>
<body>

<div class="app-container">

            <tr>
                <td style="width: 20%;"><img id="logoImg" src="/static/logo-elecnor.png" class="logo-img"></td>
                <td style="width: 50%;">FORMULARIO ALERTAFLOTA<br>PROYECTO COPIAPÓ SOLAR</td>
                <td style="width: 30%;" class="tech-info">

                </td>
            </tr>
        </table>
        
        <div class="section-header">1. CONTEXTO</div>

                    <option value="AUTOBÚS">AUTOBÚS (TRANSPORTE COLECTIVO)</option>
                    <option value="CAMA BAJA - CAMIÓN">CAMA BAJA - CAM
